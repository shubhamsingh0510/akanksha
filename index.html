<!DOCTYPE html>
<html>
<head>
<title>For Akanksha ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
text-align:center;
color:#444;
}

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#startBtn{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#e91e63;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
width:340px;
display:none;
}

.name{
font-size:34px;
color:#e91e63;
text-shadow:0 0 10px pink,0 0 20px pink;
margin-bottom:10px;
}

.slideshow{
width:220px;
height:220px;
margin:20px auto;
overflow:hidden;
border-radius:50%;
position:relative;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
display:none;
}

/* Pehli photo turant dikhe */
.slideshow img:first-child{
display:block;
}

#message{
margin-top:20px;
font-size:18px;
min-height:80px;
}

.signature{
margin-top:20px;
font-weight:bold;
color:#e91e63;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
animation:confetti 4s linear infinite;
}

@keyframes confetti{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>

<body>

<div id="startScreen">
<h1>Akanksha ❤️</h1>
<button id="startBtn">Click for your surprise</button>
</div>

<div class="card" id="card">

<div class="name">Akanksha 🌸</div>

<h2>Happy Women's Day</h2>

<div class="slideshow">
<img src="akanksha2.jpg">
<img src="akanksha3.jpg">
</div>

<p id="message"></p>

<div class="signature">
For Akanksha ❤️ From Shubham
</div>

</div>

<audio id="music" loop>
<source src="Love.mp3" type="audio/mp3">
</audio>

<script>

// Typewriter message
let text="Your strength, grace and kindness make the world a beautiful place. And honestly, just having you in my life makes everything brighter. Happy Women's Day Akanksha ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

// Button click
document.getElementById("startBtn").onclick=function(){

document.getElementById("startScreen").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("music").play();

type();
}

// Slideshow
let slideIndex=0;
let slides=document.querySelectorAll(".slideshow img");

function showSlides(){
slides.forEach(img=>img.style.display="none");
slideIndex++;
if(slideIndex>slides.length){
slideIndex=1;
}
slides[slideIndex-1].style.display="block";
setTimeout(showSlides,3000);
}

// **Slideshow start immediately**  
showSlides();

// Hearts
for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.innerHTML="❤";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(heart);
}

// Confetti
for(let i=0;i<40;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(confetti);
}

</script>

</body>
</html>
